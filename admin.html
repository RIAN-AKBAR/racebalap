<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Race Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0b1a2a 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Login Form */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: rgba(10, 20, 28, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #ffcc4455;
        }

        .login-box h2 {
            color: #ffcc44;
            margin-bottom: 20px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 12px 16px;
            background: #1e2a32;
            border: 1px solid #ffb347;
            border-radius: 60px;
            color: white;
            margin-bottom: 15px;
        }

        .login-box button {
            width: 100%;
            background: linear-gradient(95deg, #d62c1e, #ff5e2e);
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        .error-msg {
            color: #ff6666;
            text-align: center;
            margin-top: 10px;
        }

        /* Admin Panel (setelah login) */
        .admin-panel {
            display: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: #ffcc44;
        }

        .logout-btn {
            background: #2c3e4e;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            border: none;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
        }

        .card {
            background: rgba(10, 20, 28, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid rgba(255, 215, 100, 0.3);
            padding: 20px;
        }

        .card h2 {
            color: #ffcc44;
            border-left: 6px solid #e32222;
            padding-left: 16px;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px 14px;
            background: #1e2a32;
            border: 1px solid #ffb347;
            border-radius: 60px;
            color: white;
            margin-bottom: 10px;
        }

        button {
            background: linear-gradient(95deg, #d62c1e, #ff5e2e);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin: 4px;
        }

        .btn-small {
            background: #2c3e4e;
            padding: 5px 12px;
            font-size: 0.8rem;
        }

        .btn-danger {
            background: #a1221a;
        }

        .racer-list, .matches-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .racer-item, .match-item {
            background: #0f1a1f;
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .match-item {
            flex-direction: column;
            align-items: stretch;
        }

        .duel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .vs {
            color: #ff8844;
            font-weight: bold;
        }

        .empty-message {
            text-align: center;
            padding: 30px;
            color: #aaa;
        }

        @media (max-width: 850px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="login-container" id="loginContainer">
    <div class="login-box">
        <h2>🔐 Admin Login</h2>
        <input type="password" id="adminPassword" placeholder="Masukkan Password Admin" autocomplete="off">
        <button id="loginBtn">Login</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div class="container admin-panel" id="adminPanel">
    <div class="header">
        <h1>🏁 ADMIN RACE MANAGER</h1>
        <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
    </div>

    <div class="dashboard">
        <!-- Kolom Kiri: Manajemen Pembalap -->
        <div class="card">
            <h2>🏎️ Kelola Pembalap</h2>
            <input type="text" id="racerName" placeholder="Nama pembalap (contoh: Brian, Tante)">
            <div>
                <button id="addRacerBtn">➕ Tambah Pembalap</button>
                <button id="addExampleBtn" class="btn-small">📋 Contoh: Brian, Tante, Max, Lewis</button>
            </div>
            <div class="racer-list" id="racerList">
                <div class="empty-message">Memuat data...</div>
            </div>
        </div>

        <!-- Kolom Kanan: Manajemen Pertandingan -->
        <div class="card">
            <h2>🏁 Kelola Race</h2>
            <div style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
                <button id="generateMatchesBtn">🔄 Generate Race Otomatis</button>
                <button id="clearMatchesBtn" class="btn-small btn-danger">🗑️ Hapus Semua Race</button>
            </div>
            <div class="matches-list" id="matchesList">
                <div class="empty-message">Memuat data...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;
    const ADMIN_PASSWORD = 'admin123'; // GANTI dengan password yang lebih aman!

    let currentRacers = [];
    let currentMatches = [];

    // Cek status login
    function checkLogin() {
        const isLoggedIn = sessionStorage.getItem('adminLoggedIn') === 'true';
        if (isLoggedIn) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadAllData();
        } else {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
        }
    }

    // Login
    document.getElementById('loginBtn').addEventListener('click', () => {
        const password = document.getElementById('adminPassword').value;
        if (password === ADMIN_PASSWORD) {
            sessionStorage.setItem('adminLoggedIn', 'true');
            checkLogin();
            document.getElementById('loginError').innerText = '';
        } else {
            document.getElementById('loginError').innerText = '❌ Password salah!';
        }
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
        sessionStorage.removeItem('adminLoggedIn');
        checkLogin();
    });

    // Fungsi CRUD
    async function loadRacers() {
        try {
            const res = await fetch(`${API_BASE}/api/racers`);
            currentRacers = await res.json();
            renderRacers();
        } catch (err) {
            console.error(err);
        }
    }

    async function loadMatches() {
        try {
            const res = await fetch(`${API_BASE}/api/matches`);
            currentMatches = await res.json();
            renderMatches();
        } catch (err) {
            console.error(err);
        }
    }

    async function loadAllData() {
        await loadRacers();
        await loadMatches();
    }

    function renderRacers() {
        const container = document.getElementById('racerList');
        if (!currentRacers.length) {
            container.innerHTML = '<div class="empty-message">🏁 Belum ada pembalap. Tambah sekarang!</div>';
            return;
        }
        container.innerHTML = currentRacers.map(racer => `
            <div class="racer-item">
                <span>🏎️ <strong>${escapeHtml(racer.name)}</strong></span>
                <div>
                    <button class="btn-small edit-racer" data-id="${racer.id}" data-name="${escapeHtml(racer.name)}">✏️ Edit</button>
                    <button class="btn-small btn-danger delete-racer" data-id="${racer.id}">🗑️ Hapus</button>
                </div>
            </div>
        `).join('');

        // Event edit
        document.querySelectorAll('.edit-racer').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.dataset.id;
                const oldName = btn.dataset.name;
                const newName = prompt('Edit nama pembalap:', oldName);
                if (newName && newName.trim()) {
                    await fetch(`${API_BASE}/api/racers`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: parseInt(id), name: newName.trim() })
                    });
                    loadAllData();
                }
            });
        });

        // Event hapus
        document.querySelectorAll('.delete-racer').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('Yakin hapus pembalap ini?')) {
                    await fetch(`${API_BASE}/api/racers?id=${btn.dataset.id}`, { method: 'DELETE' });
                    loadAllData();
                }
            });
        });
    }

    function renderMatches() {
        const container = document.getElementById('matchesList');
        if (!currentMatches.length) {
            container.innerHTML = '<div class="empty-message">🏁 Belum ada race. Klik "Generate Race Otomatis"</div>';
            return;
        }
        container.innerHTML = currentMatches.map(match => `
            <div class="match-item">
                <div class="duel">
                    <span class="racer">🏎️ ${escapeHtml(match.racer1_name)}</span>
                    <span class="vs">VS</span>
                    <span class="racer">🏎️ ${escapeHtml(match.racer2_name)}</span>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px;">
                    <button class="btn-small set-winner" data-id="${match.id}" data-winner="${match.racer1_name}">🏆 ${escapeHtml(match.racer1_name)} Menang</button>
                    <button class="btn-small set-winner" data-id="${match.id}" data-winner="${match.racer2_name}">🏆 ${escapeHtml(match.racer2_name)} Menang</button>
                    <button class="btn-small btn-danger delete-match" data-id="${match.id}">🗑️ Hapus</button>
                </div>
                ${match.winner ? `<div style="margin-top: 8px; color: #ffcc44;">🏆 Pemenang: ${escapeHtml(match.winner)}</div>` : ''}
            </div>
        `).join('');

        // Event set winner
        document.querySelectorAll('.set-winner').forEach(btn => {
            btn.addEventListener('click', async () => {
                const matchId = parseInt(btn.dataset.id);
                const winner = btn.dataset.winner;
                await fetch(`${API_BASE}/api/matches`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: matchId, winner })
                });
                loadMatches();
            });
        });

        // Event hapus match
        document.querySelectorAll('.delete-match').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('Hapus race ini?')) {
                    await fetch(`${API_BASE}/api/matches?id=${btn.dataset.id}`, { method: 'DELETE' });
                    loadMatches();
                }
            });
        });
    }

    // Tambah pembalap
    document.getElementById('addRacerBtn').addEventListener('click', async () => {
        const name = document.getElementById('racerName').value.trim();
        if (!name) return alert('Masukkan nama pembalap!');
        await fetch(`${API_BASE}/api/racers`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
        });
        document.getElementById('racerName').value = '';
        loadRacers();
    });

    // Contoh data
    document.getElementById('addExampleBtn').addEventListener('click', async () => {
        const examples = ['Brian', 'Tante', 'Max Verstappen', 'Lewis Hamilton', 'Charles Leclerc', 'Lando Norris'];
        for (const name of examples) {
            await fetch(`${API_BASE}/api/racers`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
        }
        loadRacers();
    });

    // Generate race otomatis
    document.getElementById('generateMatchesBtn').addEventListener('click', async () => {
        await fetch(`${API_BASE}/api/matches/generate`, { method: 'POST' });
        loadMatches();
    });

    // Hapus semua race
    document.getElementById('clearMatchesBtn').addEventListener('click', async () => {
        if (confirm('Hapus SEMUA race?')) {
            await fetch(`${API_BASE}/api/matches`, { method: 'DELETE' });
            loadMatches();
        }
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Inisialisasi
    checkLogin();

    // Enter key login
    document.getElementById('adminPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
</script>
</body>
</html>
